<!DOCTYPE html>
<html>
<head>
    <title>Performance Predictor</title>

    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #0f3d2e, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 30px;
        width: 360px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        border-top: 6px solid #1b8a5a;
    }

    h2 {
        color: #1b8a5a;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        transition: 0.3s;
    }

    input:focus {
        border-color: #1b8a5a;
        outline: none;
        box-shadow: 0 0 5px rgba(27, 138, 90, 0.5);
    }

    button {
        width: 100%;
        padding: 10px;
        background: #1b8a5a;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #146c46;
    }

    .result {
        margin-top: 15px;
        font-weight: bold;
        color: #1b8a5a;
    }
</style>
</head>

<body>

    <div class="card">
        <h2>Student Predictor</h2>

        <form action="/predict" method="POST">
            <input type="number" name="hours" placeholder="Learning Hours" required>
            <input type="number" name="attendance" placeholder="Attendance (%)" required>

            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
            <div class="result">
                Result: {{ prediction }}
            </div>
        {% endif %}
    </div>

</body>
</html>
